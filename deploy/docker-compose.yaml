networks:
  corabea_internal:
    external: true

secrets:
  REDIS_PASSWORD:        { file: /opt/transcriber/secrets/REDIS_PASSWORD }
  S3_ACCESS_KEY_ID:      { file: /opt/transcriber/secrets/S3_ACCESS_KEY_ID }
  S3_SECRET_ACCESS_KEY:  { file: /opt/transcriber/secrets/S3_SECRET_ACCESS_KEY }

x-all-secrets: &all_secrets
  - REDIS_PASSWORD
  - S3_ACCESS_KEY_ID
  - S3_SECRET_ACCESS_KEY

services:
  transcriber:
    image: corabea-transcriber:latest
    container_name: corabea-transcriber
    restart: always
    env_file:
      - .env

    secrets: *all_secrets

    networks:
      - corabea_internal

    healthcheck:
      disable: true

    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    networks:
      - corabea_internal
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models:
